# Phase 0 spike tmux config — minimal, isolated from the user's own tmux setup.
set -g mouse on
set -g history-limit 50000
# Make the status bar obvious so we know we're in the spike server.
set -g status-style 'bg=colour24 fg=colour231'
set -g status-left '[claude-mgr SPIKE] '
set -g status-right 'mouse=on  %H:%M'
# Natural wheel scroll: enter copy-mode on wheel-up over a non-alt-screen pane.
# (Alt-screen apps like claude-in-fullscreen handle the wheel themselves.)
